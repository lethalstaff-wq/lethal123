name: lethal-fpbot CI

on:
  push:
    branches: ["**"]
    paths:
      - "lethal-fpbot/**"
      - ".github/workflows/lethal-fpbot.yml"
  pull_request:
    paths:
      - "lethal-fpbot/**"
      - ".github/workflows/lethal-fpbot.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lethal-fpbot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: lethal-fpbot/requirements-dev.txt

      - name: Install system deps for lxml
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt1-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        env:
          BOT_TOKEN: dummy
          ENCRYPTION_KEY: ""
        run: pytest -q
