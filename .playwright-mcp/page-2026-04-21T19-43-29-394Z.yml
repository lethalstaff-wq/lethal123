            - heading "Introduction to DMA" [level=2] [ref=e54]
            - paragraph [ref=e55]: DMA (Direct Memory Access) cheating is one of the most advanced and undetectable methods of game modification. Unlike traditional software cheats that run on your gaming PC, DMA cheats use external hardware to read game memory directly from a separate computer.
          - generic [ref=e57]:
            - heading "ℹ How DMA Works" [level=2] [ref=e58]:
              - generic [ref=e59]: ℹ
              - text: How DMA Works
            - paragraph [ref=e60]: A DMA setup requires a second PC connected to your gaming PC via a PCIe card. The second PC reads the game's memory through the DMA card without leaving any traces on the gaming PC itself. Since no cheat software runs on your gaming machine, anti-cheat cannot detect it.
          - generic [ref=e61]:
            - heading "Key Components" [level=2] [ref=e62]
            - paragraph [ref=e63]: "A complete DMA setup typically includes:"
            - list [ref=e64]:
              - listitem [ref=e65]:
                - generic [ref=e66]: •
                - generic [ref=e67]: DMA Card (e.g., Captain 100T, Squirrel, Screamer) - installed in gaming PC
              - listitem [ref=e68]:
                - generic [ref=e69]: •
                - generic [ref=e70]: Second PC (Cheat PC) - runs the cheat software and displays ESP
              - listitem [ref=e71]:
                - generic [ref=e72]: •
                - generic [ref=e73]: Fuser (optional) - for display output manipulation and overlay
              - listitem [ref=e74]:
                - generic [ref=e75]: •
                - generic [ref=e76]: KMBox (optional) - for input simulation (aimbot, recoil control)
              - listitem [ref=e77]:
                - generic [ref=e78]: •
                - generic [ref=e79]: Custom Firmware - for anti-cheat bypass and FPGA configuration
          - generic [ref=e81]:
            - heading "💡 Why DMA is Undetectable" [level=2] [ref=e82]:
              - generic [ref=e83]: 💡
              - text: Why DMA is Undetectable
            - paragraph [ref=e84]: Since the cheat runs on a completely separate PC and only reads memory (never writes), anti-cheat software on your gaming PC cannot detect any modifications. The DMA card appears as a legitimate PCIe device with spoofed signatures.
          - generic [ref=e85]:
            - heading "Read-Only vs Read-Write" [level=2] [ref=e86]
            - paragraph [ref=e87]: Most DMA cheats are read-only, meaning they only read game memory to display ESP, radar, and other visual information. Read-write cheats can also modify game memory for features like aimbot, but carry slightly more risk.
